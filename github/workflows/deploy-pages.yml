name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "data/apartments.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/data
          cp -r frontend/. _site/
          # Copy latest apartments JSON so the dashboard can fetch it
          cp data/apartments.json _site/data/apartments.json 2>/dev/null || echo '[]' > _site/data/apartments.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

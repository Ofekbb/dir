name: Scrape Apartments

on:
  schedule:
    - cron: "*/6 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libatk-bridge2.0-0t64 libatk1.0-0t64 libcups2t64 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0t64 libnspr4 libnss3 \
            libpango-1.0-0 libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 \
            libxrandr2 xvfb fonts-noto-color-emoji

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APT_URLS: ${{ secrets.APT_URLS }}
        run: python -m backend.main

      - name: Commit and push data changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/apartments.db data/apartments.json
          git diff --staged --quiet || git commit -m "chore: update apartments data"
          git pull --rebase
          git push
